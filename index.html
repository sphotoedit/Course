<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Sphotoedit — Course Portal</title>

<!--
  ============================================================================
  SPHOTOEDIT COURSE PORTAL — SETUP GUIDE (read this before using)
  ============================================================================
  This is a single self-contained HTML file. No server, no build step.
  Upload it anywhere (GitHub Pages, Netlify, your own hosting, even a Google
  Drive shared link won't work for hosting — use real static hosting) and
  it will run entirely in the student's browser.

  STEP 1 — Create your Google Sheet
  ----------------------------------
  Make one Google Sheet. Share it: "Anyone with the link" → Viewer.
  Copy the Sheet ID from the URL:
     https://docs.google.com/spreadsheets/d/  >>>THIS PART<<<  /edit
  Paste it into CONFIG.SHEET_ID below.

  STEP 2 — Make an "Access" tab (exact name: Access)
  ----------------------------------
  Column A = Email, Column B = Courses the student unlocked.
  Row 1 can be a header ("Email", "Courses") — it's auto-skipped.
  In Column B, list course IDs separated by space or comma, e.g:
     riya@gmail.com      PhotoshopBasics
     arjun@gmail.com      PhotoshopBasics, CanvaEssentials
  The IDs here must exactly match a course "id" in CONFIG.COURSES below
  (and match that course's own sheet tab name). # symbols are fine too,
  e.g. "#PhotoshopBasics" — they're ignored.

  STEP 3 — Make one tab per course
  ----------------------------------
  Tab name = the course "id" (e.g. "PhotoshopBasics"), exactly.
  Cell A1 = the course title shown to students (optional — falls back to
  the title you set in CONFIG.COURSES if left blank).
  From row 2 down:
     Column A = Lecture/Assignment title
     Column B = YouTube or Google Drive link
     Column C = (optional) type — write "Assignment", anything else / left
                blank is treated as "Lecture"

  STEP 4 — List the course on the dashboard
  ----------------------------------
  Option A (recommended, no code editing ever again): add a "Courses" tab
  with columns id | title | description | emoji, one row per course. The
  page reads this automatically every time someone logs in. The "emoji"
  column accepts either an emoji character (🎨) or a direct image URL
  (ending in .png/.jpg etc) — paste a link and it renders as an icon.
  Option B: add an entry to CONFIG.COURSES below instead. Only used as a
  fallback if there's no "Courses" tab (or it's empty).

  That's it — open the HTML file, enter an email that's in the Access tab,
  and the matching course(s) unlock. There's a companion Apps Script that
  creates course tabs and emails students their link automatically from a
  menu inside the Sheet — see the setup guide provided alongside this file.
  ============================================================================
-->

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap');

  :root{
    --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-display: 'Outfit', sans-serif;
    --blue:#2F38B2;
    --blue-dark:#232a8a;
    --white:#FFFFFF;
    --dark:#323232;
    --dark-2:#2a2a2a;
    --yellow:#F5DF4E;
    --black:#0D0D0D;
    --muted: rgba(255,255,255,.56);
    --muted-dim: rgba(255,255,255,.32);
    --radius-sm:4px;
    --radius-md:8px;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{ height:100%; }

  body{
    font-family:var(--font-ui);
    background:var(--black);
    color:var(--white);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1, h2, h3, .eyebrow, .course-label, .pill {
    font-family:var(--font-display);
  }

  #app{ min-height:100vh; }

  a{ color:inherit; }

  button{ font-family:inherit; cursor:pointer; border:none; }

  input{ font-family:inherit; }

  ::selection{ background:var(--yellow); color:var(--black); }

  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-track{ background:var(--dark); }
  ::-webkit-scrollbar-thumb{ background:var(--blue); border-radius:8px; }

  /* ---------- shared layout bits ---------- */
  .eyebrow{
    font-size:11px;
    font-weight:600;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--yellow);
  }

  .accent-bar{
    width:40px;
    height:3px;
    background:var(--blue);
    margin:14px 0 20px;
  }

  .pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--yellow);
    color:var(--black);
    font-size:11px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    padding:4px 10px;
    border-radius:4px;
  }
  .pill.pill-locked{
    background: rgba(255, 74, 74, 0.12);
    color: #FF5A5A;
    border: 1.5px solid rgba(255, 74, 74, 0.22);
  }

  .pill.pill-outline{
    background:transparent;
    color:var(--muted);
    border:1px solid rgba(255,255,255,.18);
  }

  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    background:var(--blue);
    color:var(--white);
    font-weight:600;
    font-size:14px;
    padding:13px 26px;
    border-radius:4px;
    transition:background .15s ease, transform .1s ease;
    white-space:nowrap;
  }
  .btn:hover{ background:var(--blue-dark); }
  .btn:active{ transform:scale(.98); }
  .btn:disabled{ opacity:.5; cursor:not-allowed; }

  .btn-ghost{
    background:transparent;
    border:1.5px solid rgba(255,255,255,.2);
    color:var(--white);
  }
  .btn-ghost:hover{ border-color:var(--yellow); background:transparent; }

  .btn-block{ width:100%; }

  /* dot-grid decorative background, brand-approved low-opacity texture */
  .dot-grid{
    position:absolute; inset:0;
    background-image:radial-gradient(rgba(47,56,178,.35) 1px, transparent 1px);
    background-size:26px 26px;
    opacity:.5;
    pointer-events:none;
  }

  /* ================= CENTER SCREENS (login / locked / loading / error) ================= */
  .center-screen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
    overflow:hidden;
  }

  .brand-mark{
    position:absolute;
    top:28px; left:28px;
    display:flex; align-items:center; gap:10px;
    font-weight:800; letter-spacing:.5px; font-size:15px;
    z-index:2;
    cursor:pointer;
  }
  .brand-mark .sq{ width:10px; height:10px; background:var(--yellow); border-radius:2px; }

  /* ---------- Immersive Glassmorphic Login Overlay ---------- */
  .login-overlay-wrap {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(13, 13, 13, 0.45);
    backdrop-filter: blur(14px) saturate(180%);
    -webkit-backdrop-filter: blur(14px) saturate(180%);
  }
  .glass-card {
    background: rgba(28, 28, 36, 0.7) !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6) !important;
  }
  .brand-mark-login {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    letter-spacing: .5px;
    font-size: 15px;
    margin-bottom: 20px;
  }
  .brand-mark-login .sq {
    width: 10px;
    height: 10px;
    background: var(--yellow);
    border-radius: 2px;
  }

  .card{
    position:relative;
    z-index:2;
    width:100%;
    max-width:420px;
    background:var(--dark);
    padding:44px 36px;
    border-radius:8px;
  }

  /* corner-frame accent, brand shape system item, yellow 2px corners */
  .card::before, .card::after,
  .card .corner-br, .card .corner-tl{
    content:"";
    position:absolute;
    width:22px; height:22px;
    border-color:var(--yellow);
    border-style:solid;
    opacity:.9;
  }
  .card::before{ top:-1px; left:-1px; border-width:2px 0 0 2px; }
  .card::after{ bottom:-1px; right:-1px; border-width:0 2px 2px 0; }

  .card h1{
    font-size:26px;
    font-weight:800;
    line-height:1.2;
    text-align:left;
  }

  .card p.sub{
    color:var(--muted);
    font-size:14px;
    margin-top:10px;
    line-height:1.55;
    text-align:left;
  }

  .field{ margin-top:22px; }
  .field label{
    display:block;
    font-size:11px;
    font-weight:600;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:8px;
  }
  .field input{
    width:100%;
    background:var(--black);
    border:1.5px solid rgba(255,255,255,.12);
    color:var(--white);
    padding:14px 14px;
    border-radius:4px;
    font-size:15px;
    outline:none;
    transition:border-color .15s ease;
  }
  .field input:focus{ border-color:var(--blue); }
  .field input::placeholder{ color:var(--muted-dim); }

  .form-actions{ margin-top:22px; }

  .form-error{
    margin-top:14px;
    font-size:13px;
    color:#ff9b9b;
    display:none;
  }
  .form-error.show{ display:block; }

  .lock-icon{
    width:52px; height:52px;
    border-radius:8px;
    background:rgba(245,223,78,.12);
    border:1.5px solid var(--yellow);
    display:flex; align-items:center; justify-content:center;
    margin-bottom:20px;
    font-size:22px;
  }

  .spinner{
    width:34px; height:34px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,.15);
    border-top-color:var(--yellow);
    animation:spin .8s linear infinite;
    margin:0 auto 16px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .loading-text{ text-align:center; color:var(--muted); font-size:14px; }

  .contact-box{
    margin-top:24px;
    padding:14px 16px;
    background:rgba(255,255,255,.04);
    border-left:3px solid var(--blue);
    border-radius:4px;
    font-size:13px;
    color:var(--muted);
    line-height:1.6;
  }
  .contact-box strong{ color:var(--white); }

  /* ================= DASHBOARD ================= */
  .dash-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:22px 32px;
    border-bottom:1px solid rgba(255,255,255,.08);
    flex-wrap:wrap;
    gap:12px;
  }
  .dash-header .brand-mark{ position:static; }
  .dash-user{ display:flex; align-items:center; gap:14px; }
  .dash-user .email-chip{
    font-size:12px;
    color:var(--muted);
    background:rgba(255,255,255,.05);
    padding:7px 12px;
    border-radius:20px;
    cursor:pointer;
    transition: color 0.15s ease, background-color 0.15s ease;
    user-select: none;
  }
  .dash-user .email-chip:hover {
    color: var(--white);
    background: rgba(255,255,255,.1);
  }
  .link-btn{
    background:transparent;
    color:var(--muted);
    font-size:13px;
    font-weight:500;
    text-decoration:underline;
    text-underline-offset:3px;
  }
  .link-btn:hover{ color:var(--yellow); }

  .dash-hero{ padding:44px 32px 8px; max-width:1100px; }
  .dash-hero h1{ font-size:32px; font-weight:800; text-align:left; }
  .dash-hero p{ color:var(--muted); margin-top:8px; font-size:14px; max-width:520px; }

  .course-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
    gap:20px;
    padding:24px 32px 64px;
    max-width:1100px;
  }

  .course-card{
    background:var(--dark);
    border-radius:8px;
    padding:24px;
    position:relative;
    overflow:hidden;
    border:1.5px solid transparent;
    transition:border-color .15s ease, transform .12s ease;
  }
  .course-card.unlocked{
    cursor:pointer;
    border-color:rgba(47, 56, 178, 0.15); /* subtle active border to indicate unlocked */
  }
  .course-card.unlocked:hover{
    border-color:var(--blue);
    transform:translateY(-2px);
    box-shadow: 0 8px 24px rgba(47, 56, 178, 0.15);
  }
  .course-card.locked{
    opacity:.65;
    cursor:pointer;
  }
  .course-card.locked:hover{
    border-color:rgba(255, 255, 255, 0.2);
    opacity:1;
    transform:translateY(-2px);
  }

  .course-emoji{
    width:46px; height:46px;
    border-radius:8px;
    background:rgba(47,56,178,.25);
    display:flex; align-items:center; justify-content:center;
    font-size:22px;
    margin-bottom:16px;
    overflow:hidden;
  }
  .course-card.locked .course-emoji{ background:rgba(255,255,255,.06); }

  .course-card h3{ font-size:17px; font-weight:700; text-align:left; margin-bottom:6px; }
  .course-card p{ font-size:13px; color:var(--muted); line-height:1.5; text-align:left; }

  .course-card .status-row{
    margin-top:18px;
    display:flex; align-items:center; justify-content:space-between;
  }

  .lock-badge{
    font-size:11px; font-weight:600; color:var(--muted);
    display:flex; align-items:center; gap:5px;
  }

  .progress-track{
    height:4px; background:rgba(255,255,255,.08); border-radius:4px; margin-top:14px; overflow:hidden;
  }
  .progress-fill{ height:100%; background:var(--yellow); border-radius:4px; }

  /* ================= PLAYER ================= */
  .player-wrap{ display:flex; min-height:100vh; }

  .sidebar{
    width:340px;
    flex-shrink:0;
    background:var(--dark);
    border-right:1px solid rgba(255,255,255,.08);
    display:flex;
    flex-direction:column;
    max-height:100vh;
    position:sticky;
    top:0;
  }

  .sidebar-head{
    padding:22px 20px 16px;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  .sidebar-head .back-link{
    font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px; margin-bottom:14px;
  }
  .sidebar-head .back-link:hover{ color:var(--yellow); }
  .sidebar-head h2{ font-size:16px; font-weight:700; text-align:left; line-height:1.3; }
  .sidebar-head .layers-label{
    font-size:10px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-top:12px;
  }

  .layer-list{ overflow-y:auto; flex:1; padding:8px 0; }

  .layer-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 14px;
    margin: 4px 12px;
    border-radius: 6px;
    cursor:pointer;
    transition: all 0.2s ease;
    border:1px solid transparent;
  }
  .layer-row:hover{ background:rgba(255,255,255,.04); }
  .layer-row.active{ border-color:rgba(47,56,178,.3); background:rgba(47,56,178,.12); }

  .layer-badge{
    flex-shrink:0;
    width:22px; height:22px;
    border-radius:4px;
    background:rgba(255,255,255,.05);
    color:var(--muted);
    border:1px solid rgba(255,255,255,.08);
    font-size:10px;
    font-weight:600;
    display:flex; align-items:center; justify-content:center;
    transition: all 0.15s ease;
  }
  .layer-row.active .layer-badge{ background:var(--blue); color:var(--white); border-color:var(--blue); }
  .layer-row.watched .layer-badge{ background:rgba(255,221,0,.08); color:var(--yellow); border-color:rgba(255,221,0,.2); }

  .layer-info{ flex:1; min-width:0; }
  .layer-title{ font-size:13px; font-weight:500; line-height:1.4; color:rgba(255,255,255,0.7); }
  .layer-row.active .layer-title{ color:var(--white); font-weight:600; }
  .layer-meta{ margin-top:4px; display:flex; align-items:center; gap:8px; }
  .type-tag{
    font-size:9px; font-weight:600; letter-spacing:.5px; text-transform:uppercase;
    color:rgba(255,255,255,0.5); background:rgba(255,255,255,0.05); padding:2px 6px; border-radius:3px;
    border:1px solid rgba(255,255,255,0.08);
  }
  .type-tag.assignment{ background:rgba(255,221,0,0.05); border:1px solid rgba(255,221,0,0.2); color:var(--yellow); }
  .watched-check{ font-size:11px; color:var(--yellow); }

  .player-main{ flex:1; min-width:0; display:flex; flex-direction:column; }

  .player-topbar{
    display:none;
    align-items:center; justify-content:space-between;
    padding:16px 20px;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  .hamburger{
    background:transparent; color:var(--white); font-size:20px; padding:4px 8px;
  }

  .player-body{ padding:36px 44px 60px; max-width:1200px; width:100%; margin:0 auto; }

  .video-shell{
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    border-radius:12px;
    overflow:hidden;
    position:relative;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 40px rgba(47, 56, 178, 0.2);
  }
  .video-shell iframe{ width:100%; height:100%; border:0; }

  .lecture-heading{ margin-top:28px; }
  .lecture-heading h1{ font-size:24px; font-weight:800; text-align:left; }
  .lecture-heading .meta-row{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .lecture-heading .position{ font-size:13px; color:var(--muted); }

  .nav-buttons{ display:flex; gap:12px; margin-top:32px; }

  .empty-state{
    padding:60px 20px; text-align:center; color:var(--muted); max-width:480px; margin:0 auto;
  }

  /* mobile drawer overlay */
  .drawer-overlay{
    display:none;
    position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:40;
  }
  .drawer-overlay.show{ display:block; }

  @media (max-width: 860px){
    .sidebar{
      position:fixed; top:0; left:0; height:100vh; z-index:50;
      transform:translateX(-100%);
      transition:transform .2s ease;
      width:82%; max-width:340px;
    }
    .sidebar.open{ transform:translateX(0); }
    .player-topbar{ display:flex; }
    .player-body{ padding:22px 18px 50px; }
    .dash-hero{ padding:32px 20px 4px; }
    .course-grid{ padding:18px 20px 50px; }
    .dash-header{ padding:18px 20px; }
    .meta-row-wrap { margin-top: 16px; }
  }

  /* New video player layout styling and elements */
  .meta-row-wrap {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 24px;
    margin-bottom: 8px;
  }
  .meta-row-wrap .nav-buttons {
    margin-top: 0;
  }
  .lecture-heading { margin-top: 16px; }
  .btn-nav {
    padding: 8px 16px;
    font-size: 13px;
  }
  .lecture-details-card {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    padding: 24px;
    margin-top: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .lecture-desc-section h3 {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--yellow);
    margin-bottom: 10px;
  }
  .lecture-desc {
    font-size: 14.5px;
    line-height: 1.6;
    color: rgba(255, 255, 255, 0.8);
  }
  .lecture-desc a {
    color: var(--yellow);
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: color 0.15s ease;
  }
  .lecture-desc a:hover {
    color: #ebd235;
  }
  .btn-assets {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255, 221, 0, 0.08);
    border: 1.5px solid rgba(255, 221, 0, 0.25);
    color: var(--yellow);
    font-weight: 600;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
    transition: all 0.2s ease;
    width: fit-content;
    box-shadow: 0 4px 12px rgba(255, 221, 0, 0.05);
  }
  .btn-assets:hover {
    background: var(--yellow);
    color: var(--dark);
    border-color: var(--yellow);
    transform: translateY(-1.5px);
    box-shadow: 0 8px 20px rgba(255, 221, 0, 0.25);
  }
  .btn-assets:active {
    transform: translateY(0);
  }

  /* Brand mark wrap for flex header alignment */
  .brand-mark-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: flex-start;
  }
  .brand-mark-wrap-mobile {
    display: flex;
    flex-direction: column;
    gap: 2px;
    align-items: flex-start;
  }
  .contact-support {
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
  }
  .contact-support a {
    color: var(--yellow);
    text-decoration: underline;
    text-underline-offset: 3px;
    font-weight: 600;
    transition: color 0.15s ease;
  }
  .contact-support a:hover {
    color: #ebd235;
  }

  /* Notifications bell & dropdown */
  .notif-wrapper {
    position: relative;
    display: inline-block;
  }
  .notif-bell-btn {
    background: transparent;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    border-radius: 50%;
    transition: background 0.2s ease, color 0.2s ease;
    position: relative;
  }
  .notif-bell-btn:hover {
    background: rgba(255, 255, 255, 0.05);
    color: var(--white);
  }
  .notif-badge {
    position: absolute;
    top: 2px;
    right: 2px;
    background: #ff4747;
    color: white;
    font-size: 9px;
    font-weight: 800;
    min-width: 14px;
    height: 14px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 3px;
    box-shadow: 0 0 10px rgba(255, 71, 71, 0.5);
  }
  .notif-dropdown {

    right: 0;
    width: 320px;
    background: var(--dark-2);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 100;
    display: none;
  }
  .notif-dropdown.show {
    display: block;
    animation: fadeInNotif 0.2s ease;
  }
  @keyframes fadeInNotif {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .notif-header {
    display: flex;
    align-items: center;
    justify-content: space-between;

  .notif-item.clickable:hover {

  .enroll-nav-btn {

    align-items: center;

    padding: 7px 12px;
    border-radius: var(--radius-sm);

    transition: background 0.15s ease;

  .enroll-nav-btn:hover {
    background: var(--blue-dark);

  /* ---------- Enroll Modal ---------- */
  .enroll-modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .enroll-modal-overlay.open {
    display: flex;
    opacity: 1;
  }
  .enroll-modal-content {
    background: #0D0D0D;
    width: 92%;
    max-width: 540px;
    height: 90vh;
    max-height: 720px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    transform: translateY(20px);
    transition: transform 0.25s ease;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    display: flex;
    flex-direction: column;
  }
  .enroll-modal-overlay.open .enroll-modal-content {
    transform: translateY(0);
  }
  .enroll-modal-close {
    position: absolute;
    top: 12px;
    right: 16px;
    background: none;
    border: none;
    color: var(--white);
    font-size: 28px;
    font-weight: 300;
    cursor: pointer;
    z-index: 2005;
    line-height: 1;
    transition: color 0.15s ease;
  }
  .enroll-modal-close:hover {
    color: var(--yellow);
  }
  .enroll-modal-iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
  }

  /* ================= MODERN GLASS REDESIGN ================= */
  :root{
    --blue:#6C7CFF;
    --blue-dark:#5160E8;
    --blue-soft:rgba(108,124,255,.18);
    --cyan:#52E0FF;
    --pink:#FF6FB1;
    --white:#FFFFFF;
    --dark:#11131C;
    --dark-2:#171A26;
    --yellow:#FFE66D;
    --black:#070910;
    --muted:rgba(238,242,255,.68);
    --muted-dim:rgba(238,242,255,.42);
    --border:rgba(255,255,255,.14);
    --glass:rgba(17,20,31,.72);
    --glass-strong:rgba(21,25,38,.86);

    --radius-sm:8px;
    --radius-md:14px;

  body{

      radial-gradient(circle at 12% 8%, rgba(108,124,255,.12), transparent 34%),

  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px);
    background-size:42px 42px;
    mask-image:linear-gradient(to bottom, rgba(0,0,0,.85), transparent 82%);
  }

  ::-webkit-scrollbar-track{ background:rgba(255,255,255,.04); }
  ::-webkit-scrollbar-thumb{

  }

  .eyebrow::after {

<script>
/* ============================================================================
   CONFIG — edit this section for your own courses / sheet
   ========================================================================= */
const CONFIG = {
  // To keep the Google Sheet ID hidden from inspection, we store it base64-encoded.
  // Paste your base64 encoded sheet ID here (encode it at https://www.base64encode.org/)
  SHEET_ID_B64: "MVJ0TURjMmswdW1OWF92MHZZcWtIQXFwQlRNTGMyX0NkNzJIVmNUTzl3eVU=",

  //   2) the id typed into the Access tab's "Courses" column for buyers

    { id: "PhotoshopBasics", title: "Photoshop Basics", description: "Core tools, layers, selections and retouching from zero.", emoji: "🎨" },
    { id: "CanvaEssentials", title: "Canva Essentials", description: "Fast, clean social & thumbnail design with Canva.", emoji: "🧩" }
  ]
};

/* ============================================================================
   STATE
   ========================================================================= */
const state = {
  screen: "login",      // login | verifying | locked | dashboard | player | error
  email: null,
  activeTab: "courses", // courses | assets
  unlockedIds: [],       // course ids this email can open
  courseList: [],        // resolved course list (from sheet, or CONFIG fallback)
  assetsList: null,      // resolved assets list
  errorMessage: "",
  notifications: [],     // loaded notifications from sheet
  unreadCount: 0,        // unread notifications count
  current: {
    courseId: null,
    courseTitle: "",
    lectures: [],         // [{title, url, type, embed}]
    index: 0
  }
};
window.state = state;

const STORAGE_KEY = "sphotoedit_portal_email";
const progressKey = (email) => "sphotoedit_progress_" + btoa(unescape(encodeURIComponent(email || "")));

/* ============================================================================
   UTIL
   ========================================================================= */
function escapeHtml(str){
  return String(str ?? "").replace(/[&<>"']/g, (c) => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

function maskEmail(email) {
  if (!email) return "";
  const parts = email.split("@");
  if (parts.length !== 2) return email;
  const username = parts[0];
  const domain = parts[1];
  if (username.length <= 2) {
    return username[0] + "***@" + domain;
  }
  return username[0] + "***" + username[username.length - 1] + "@" + domain;
}

function formatDescription(desc) {
  if (!desc) return "";
  let escaped = escapeHtml(desc);
  escaped = escaped.replace(/\n/g, "<br>");
  const urlRegex = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
  return escaped.replace(urlRegex, (url) => {
    const cleanUrl = url
      .replace(/&amp;/g, "&")
      .replace(/&lt;/g, "<")
      .replace(/&gt;/g, ">")
      .replace(/&quot;/g, '"')
      .replace(/&#39;/g, "'");
    return `<a href="${cleanUrl}" target="_blank" rel="noopener noreferrer">${cleanUrl}</a>`;
  });
}

function normalizeTag(t){
  return String(t || "").replace(/[^a-zA-Z0-9]/g, "").toLowerCase();
}

function safeLocalStorage(){
  try{ localStorage.setItem("__t","1"); localStorage.removeItem("__t"); return true; }
  catch(e){ return false; }
}
const HAS_STORAGE = safeLocalStorage();

function getProgress(email, courseId){
  if(!HAS_STORAGE) return [];
  try{
    const raw = localStorage.getItem(progressKey(email));
    const all = raw ? JSON.parse(raw) : {};
    return all[courseId] || [];
  }catch(e){ return []; }
}
function markWatched(email, courseId, index){
  if(!HAS_STORAGE) return;
  try{
    const raw = localStorage.getItem(progressKey(email));
    const all = raw ? JSON.parse(raw) : {};
    const arr = new Set(all[courseId] || []);
    arr.add(index);
    all[courseId] = Array.from(arr);
    localStorage.setItem(progressKey(email), JSON.stringify(all));
  }catch(e){ /* ignore */ }
}

function parseVideoUrl(url){
  url = String(url || "").trim();
  url = url.replace(/[\u200B-\u200D\uFEFF]/g, ""); // strip invisible chars from copy-paste

  let m = url.match(/(?:youtu\.be\/|youtube(?:-nocookie)?\.com\/(?:watch\?v=|embed\/|shorts\/|live\/))([a-zA-Z0-9_-]{6,})/i);
  if(m) return { type:"youtube", embed:`https://www.youtube-nocookie.com/embed/${m[1]}`, original:url };

  if(/youtube\.com/i.test(url)){
    m = url.match(/[?&]v=([a-zA-Z0-9_-]{6,})/i);
    if(m) return { type:"youtube", embed:`https://www.youtube-nocookie.com/embed/${m[1]}`, original:url };
  }

  m = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(m) return { type:"drive", embed:`https://drive.google.com/file/d/${m[1]}/preview`, original:url };
  m = url.match(/drive\.google\.com\/open\?id=([a-zA-Z0-9_-]+)/);
  if(m) return { type:"drive", embed:`https://drive.google.com/file/d/${m[1]}/preview`, original:url };
  m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(m && url.includes("drive.google.com")) return { type:"drive", embed:`https://drive.google.com/file/d/${m[1]}/preview`, original:url };

  return { type:"other", embed:url, original:url };
}

/* ============================================================================
   GOOGLE SHEET FETCH (gviz — works on any "Anyone with link: Viewer" sheet)
   ========================================================================= */
let __jsonpCounter = 0;
function fetchSheetRows(sheetName){
  return new Promise((resolve, reject) => {
    if(!CONFIG.SHEET_ID_B64 || CONFIG.SHEET_ID_B64.includes("PASTE_YOUR")){
      reject(new Error("NOT_READY"));
      return;
    }
    const sheetId = atob(CONFIG.SHEET_ID_B64);
    const cbName = "__portalCB" + (__jsonpCounter++) + "_" + Date.now();
    let settled = false;

    const timeout = setTimeout(() => {
      if(settled) return;
      settled = true;
      cleanup();
      reject(new Error("UNREACHABLE"));
    }, 12000);

    function cleanup(){
      clearTimeout(timeout);
      try{ delete window[cbName]; }catch(e){}
      if(script && script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = function(json){
      if(settled) return;
      settled = true;
      cleanup();
      try{
        if(!json || json.status === "error" || !json.table){ reject(new Error("NOT_FOUND")); return; }
        const rows = (json.table.rows || []).map(r => (r.c || []).map(c => (c ? (c.v ?? "") : "")));
        resolve(rows);
      }catch(e){ reject(new Error("UNREACHABLE")); }
    };

    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json;responseHandler:${cbName}&sheet=${encodeURIComponent(sheetName)}&_=${Date.now()}`;
    const script = document.createElement("script");
    script.src = url;
    script.onerror = function(){
      if(settled) return;
      settled = true;
      cleanup();
      reject(new Error("UNREACHABLE"));
    };
    document.head.appendChild(script);
  });
}

/* ============================================================================
   DATA LOGIC
   ========================================================================= */
async function fetchNotifications(){
  const defaultWarning = {
    id: "default_security_warning",
    message: "⚠️ Sharing your login email may permanently disable your course access.",
    link: ""
  };
  try {
    const rows = await fetchSheetRows("Notification");
    if(!rows.length) return [defaultWarning];
    let dataRows = rows;
    if(String(rows[0][0] || "").trim().toLowerCase() === "message" || String(rows[0][0] || "").trim().toLowerCase() === "text"){
      dataRows = rows.slice(1);
    }
    const list = dataRows
      .filter(r => String(r[0] || "").trim() !== "")
      .map((r, index) => {
        const message = String(r[0] || "").trim();
        const link = String(r[1] || "").trim();
        const id = String(r[2] || "").trim() || `notif_${index}_${btoa(unescape(encodeURIComponent(message))).substring(0, 10)}`;
        return { id, message, link };
      });
    const latest = list.reverse().slice(0, 2);
    return [defaultWarning, ...latest];
  } catch(e) {
    return [defaultWarning];
  }
}

function calculateUnreadNotifications(){
  if (!HAS_STORAGE) {
    state.unreadCount = state.notifications.length;
    return;
  }
  try {
    const readIds = JSON.parse(localStorage.getItem("sphotoedit_read_notifs") || "[]");
    const unread = state.notifications.filter(n => !readIds.includes(n.id));
    state.unreadCount = unread.length;
  } catch(e) {
    state.unreadCount = state.notifications.length;
  }
}

function markNotificationsAsRead(){
  if (!HAS_STORAGE) {
    state.unreadCount = 0;
    return;
  }
  try {
    const readIds = state.notifications.map(n => n.id);
    localStorage.setItem("sphotoedit_read_notifs", JSON.stringify(readIds));
    state.unreadCount = 0;
  } catch(e) {}
}

function toggleNotifications(event){
  event.stopPropagation();
  const dropdown = event.currentTarget.nextElementSibling;
  const isShowing = dropdown.classList.contains("show");
  
  document.querySelectorAll(".notif-dropdown").forEach(d => {
    if (d !== dropdown) d.classList.remove("show");
  });
  
  if(!isShowing){
    dropdown.classList.add("show");
    markNotificationsAsRead();
    const badges = document.querySelectorAll(".notif-badge");
    badges.forEach(b => b.remove());
  } else {
    dropdown.classList.remove("show");
  }
}

function clearNotifBadge(event){
  event.stopPropagation();
  markNotificationsAsRead();
  const badges = document.querySelectorAll(".notif-badge");
  badges.forEach(b => b.remove());
  document.querySelectorAll(".notif-dropdown").forEach(d => d.classList.remove("show"));
}

function renderNotificationList() {
  return state.notifications.map(n => {
    const isWarning = n.message.includes("Warning") || n.message.includes("Security Alert") || n.message.includes("⚠️") || n.message.includes("🔒");
    const warningClass = isWarning ? " warning" : "";
    return n.link ? `
      <a href="${escapeHtml(n.link)}" target="_blank" rel="noopener noreferrer" class="notif-item clickable${warningClass}">
        <div class="notif-text">${formatDescription(n.message)}</div>
      </a>
    ` : `
      <div class="notif-item${warningClass}">
        <div class="notif-text">${formatDescription(n.message)}</div>
      </div>
    `;
  }).join("");
}

window.toggleNotifications = toggleNotifications;
window.clearNotifBadge = clearNotifBadge;

    --dark:#141418;
    --dark-card:#1a1a20;
    --dark-elevated:#1e1e26;
    --yellow:#F5DF4E;
    --yellow-dim: rgba(245, 223, 78, 0.08);
    --black:#0a0a0c;
    --muted: rgba(255,255,255,.50);
    --muted-dim: rgba(255,255,255,.28);
    --border: rgba(255, 255, 255, 0.06);
    --border-hover: rgba(255, 255, 255, 0.12);
    --bg: #0a0a0c;
    --radius-sm:6px;
    --radius-md:10px;
    --radius-lg:14px;
    --shadow-card: 0 4px 24px rgba(0,0,0,0.25);
    --shadow-glow: 0 0 40px rgba(47, 56, 178, 0.08);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background:var(--bg);
    color:var(--white);
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle background texture */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse 600px 400px at 50% 0%, rgba(47,56,178,0.06) 0%, transparent 70%),
      radial-gradient(circle 800px at 80% 100%, rgba(245,223,78,0.02) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap{
    max-width:480px;
    margin:0 auto;
    padding:20px 16px 40px;
    position: relative;
    z-index: 1;
  }

  /* ---------- Header ---------- */
  .brand-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:28px;
  }
  .brand-mark{
    width:30px;height:30px;
    background:var(--blue);
    border-radius:var(--radius-sm);
    display:flex;align-items:center;justify-content:center;
    color:var(--yellow);font-weight:800;font-size:14px;
    letter-spacing: -0.5px;
    box-shadow: 0 2px 8px rgba(47,56,178,0.3);
  }
  .brand-name{
    font-weight:800;font-size:13px;letter-spacing:1.5px;color:rgba(255,255,255,0.85);
    text-transform: uppercase;
  }

  .eyebrow{
    font-size:10px;font-weight:700;letter-spacing:3px;
    color:var(--yellow);text-transform:uppercase;margin:0 0 6px;
    opacity: 0.9;
  }
  h1{
    font-size:26px;font-weight:800;line-height:1.15;
    margin:0 0 6px;color:var(--white);text-align:left;
    letter-spacing: -0.5px;
  }
  .sub{
    font-size:13px;color:var(--muted);margin:0 0 20px;line-height:1.5;
  }
  .accent-bar{
    width:32px;height:3px;
    background: linear-gradient(90deg, var(--blue) 0%, rgba(47,56,178,0.3) 100%);
    border-radius: 2px;
    margin:0 0 24px;
  }

  /* ---------- Google Form-style Card Containers ---------- */
  .form-card {
    background: var(--dark-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    box-shadow: var(--shadow-card);
    position: relative;
    overflow: hidden;
  }
  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--blue) 0%, rgba(47,56,178,0.2) 100%);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }

  /* ---------- Step label ---------- */
  .step-label{
    font-size:11px;font-weight:700;letter-spacing:2px;
    color:var(--muted);text-transform:uppercase;
    margin:0 0 16px;
    padding-top: 4px;
  }

  /* ---------- Course cards ---------- */
  #courseList{display:flex;flex-direction:column;gap:6px;}
  .course-card{
    display:flex;align-items:center;gap:12px;
    background:rgba(255,255,255,0.015);
    border:1px solid var(--border);
    border-radius:var(--radius-md);
    padding:12px 14px;
    cursor:pointer;
    transition:all .2s ease;
    position: relative;
  }
  .course-card:hover{
    border-color: rgba(47,56,178,0.3);
    background:rgba(255,255,255,0.025);
  }
  .course-card.checked{
    border-color: rgba(47,56,178,0.5);
    background: rgba(47, 56, 178, 0.08);
    box-shadow: 0 0 0 1px rgba(47,56,178,0.15) inset, 0 2px 12px rgba(47,56,178,0.08);
  }
  .course-check{
    width:18px;height:18px;flex:0 0 18px;
    border:2px solid rgba(255,255,255,0.12);
    border-radius:5px;
    display:flex;align-items:center;justify-content:center;
    transition:all .2s ease;
  }
  .course-card.checked .course-check{
    background:var(--blue);border-color:var(--blue);
    box-shadow: 0 2px 8px rgba(47,56,178,0.3);
  }
  .course-check svg{width:10px;height:10px;opacity:0;transition:opacity .15s ease;}
  .course-card.checked .course-check svg{opacity:1;}
  .course-body{flex:1;min-width:0;}
  .course-title-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .course-title{font-weight:600;font-size:13.5px;color:var(--white);}
  .course-price{
    font-weight:700;font-size:13px;color:var(--yellow);white-space:nowrap;
    background: var(--yellow-dim);
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid rgba(245,223,78,0.1);
  }
  .course-desc{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4;}

  .course-emoji{
    width: 20px; height: 20px;
    border-radius: 4px;
    display: inline-flex; align-items: center; justify-content: center;
    overflow: hidden;
    vertical-align: middle;
    margin-right: 6px;
    font-size: 13px;
  }

  .loading-row, .empty-row{
    font-size:12px;color:var(--muted);padding:20px 12px;text-align:center;
  }

  /* ---------- Progress Indicator ---------- */
  .progress-container {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 8px 0 28px;
    padding: 0 8px;
  }
  .progress-container::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 2px;
    background: rgba(255, 255, 255, 0.05);
    transform: translateY(-50%);
    z-index: 1;
    border-radius: 1px;
  }
  .progress-bar {
    position: absolute;
    top: 50%;
    left: 0;
    width: 0%;
    height: 2px;
    background: linear-gradient(90deg, var(--blue), rgba(47,56,178,0.5));
    transform: translateY(-50%);
    z-index: 2;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 1px;
  }
  .progress-steps {
    display: flex;
    justify-content: space-between;
    width: 100%;
    position: relative;
    z-index: 3;
  }
  .step-dot {
    width: 26px;
    height: 26px;
    background: var(--dark-card);
    border: 2px solid rgba(255, 255, 255, 0.06);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--muted-dim);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .step-dot.active {
    border-color: var(--blue);
    background: var(--blue);
    color: var(--white);
    box-shadow: 0 0 16px var(--blue-glow);
    transform: scale(1.05);
  }
  .step-dot.completed {
    border-color: var(--yellow);
    background: rgba(245,223,78,0.12);
    color: var(--yellow);
    border-width: 2px;
  }

  /* ---------- Step Panels ---------- */
  .step-panel {
    display: none;
  }
  .step-panel.active {
    display: block;
    animation: slideInPanel 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes slideInPanel {
    from { transform: translateX(100%); opacity:0.8; }
    to { transform: translateX(0); opacity:1; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Step Navigation Buttons ---------- */
  .step-actions {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-top: 24px;
  }
  .btn {
    font-family: inherit;
    font-weight: 700;
    font-size: 13px;
    padding: 11px 18px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
    white-space: nowrap;
  }
  .btn-back {
    background: rgba(255, 255, 255, 0.04);
    color: rgba(255,255,255,0.6);
    border: 1px solid var(--border);
  }
  .btn-back:hover {
    background: rgba(255, 255, 255, 0.08);
    color: var(--white);
  }
  .btn-next, .btn-submit {
    background: var(--blue);
    color: var(--white);
    flex: 1;
    text-align: center;
    box-shadow: 0 2px 12px rgba(47,56,178,0.2);
  }
  .btn-next:hover, .btn-submit:hover:not(:disabled) {
    background: var(--blue-dark);
    box-shadow: 0 4px 20px rgba(47,56,178,0.35);
    transform: translateY(-1px);
  }
  .btn-next:disabled, .btn-submit:disabled {
    background: rgba(255, 255, 255, 0.04);
    color: var(--muted-dim);
    cursor: not-allowed;
    box-shadow: none;
  }

  .qr-box{
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .qr-box img{
    width:140px;height:140px;object-fit:contain;
    border-radius:var(--radius-md);
    background:var(--white);
    margin-bottom:10px;
    padding: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .qr-pay-amount{font-size:15px;color:var(--muted);margin-top:8px;}
  .qr-pay-amount b{color:var(--yellow);font-weight:700;font-size:22px;display:block;margin:2px 0;}

  /* ---------- Mobile Direct Pay Button ---------- */
  .mobile-pay-btn{
    display:none;
    width:100%;
    margin-top:14px;
    background: linear-gradient(135deg, #25D366 0%, #20ba5a 100%);
    color:var(--black);
    border:none;
    border-radius:var(--radius-sm);
    font-family:inherit;
    font-weight:700;
    font-size:13px;
    padding:12px;
    cursor:pointer;
    align-items:center;
    justify-content:center;
    gap:6px;
    text-decoration:none;
    transition: all 0.2s ease;
    box-shadow: 0 2px 12px rgba(37,211,102,0.2);
  }
  .mobile-pay-btn:hover{
    background: linear-gradient(135deg, #20ba5a 0%, #1da44d 100%);
    transform: translateY(-1px);
  }

  label.field-label{
    display:block;font-size:10px;font-weight:600;color:var(--muted);
    margin:16px 0 6px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  input[type="email"], input[type="text"], input[type="tel"]{
    width:100%;
    padding:11px 14px;
    border:1.5px solid var(--border);
    border-radius:var(--radius-sm);
    font-family:inherit;font-size:13.5px;
    background:var(--black);color:var(--white);
    outline:none;
    transition: all .2s ease;
  }
  input[type="email"]:focus, input[type="text"]:focus, input[type="tel"]:focus{
    border-color:var(--blue);
    box-shadow: 0 0 0 3px rgba(47,56,178,0.1);
  }
  input::placeholder {
    color: var(--muted-dim);
  }

  .error-msg{
    font-size:11px;color:#ff6b6b;margin-top:5px;display:none;
    font-weight: 500;
  }
  .error-msg.show{display:block;}

  /* ---------- Success screen ---------- */
  #successScreen{
    display:none;text-align:center;
    padding:48px 16px;
    max-width: 420px;
    margin: 0 auto;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  #successScreen.open{display:flex;}
  .success-icon{
    width:60px;height:60px;border-radius:50%;
    background: linear-gradient(135deg, var(--yellow) 0%, #ebd235 100%);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 20px;
    box-shadow: 0 4px 20px rgba(245,223,78,0.2);
  }
  #successScreen h2{font-size:22px;margin:0 0 8px;color:var(--white);font-weight:800;letter-spacing:-0.3px;}
  #successScreen p{font-size:13px;color:var(--muted);line-height:1.5;margin:0 0 6px;}
  #successScreen .wa{color:var(--yellow);font-weight:600;text-decoration:none;}
  #successScreen .wa:hover{text-decoration:underline;}

  .highlight-notice {
    background: var(--yellow-dim);
    border: 1.5px solid rgba(245,223,78,0.25);
    padding: 14px 18px;
    border-radius: var(--radius-md);
    margin: 20px auto;
    max-width: 340px;
    font-size: 13.5px;
    line-height: 1.45;
    text-align: center;
    color: var(--yellow);
    font-weight: 600;
  }

  .back-link-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--blue);
    color: var(--white);
    text-decoration: none;
    font-weight: 600;
    font-size: 13px;
    padding: 11px 18px;
    border-radius: var(--radius-sm);
    transition: all 0.2s ease;
    box-shadow: 0 2px 12px rgba(47,56,178,0.2);
  }
  .back-link-btn:hover {
    background: var(--blue-dark);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(47,56,178,0.3);
  }

  .upi-copy-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    flex-wrap: wrap;
    width: 100%;
  }
  .upi-copy-row .upi-id {
    font-size: 15px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
    word-break: break-all;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .copy-btn {
    background: var(--blue);
    border: none;
    color: var(--white);
    font-family: inherit;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: all 0.15s ease;
  }
  .copy-btn:hover {
    background: var(--blue-dark);
  }

  /* ---------- Field Help / Warning ---------- */
  .field-help {
    font-size: 11.5px;
    color: rgba(245,223,78,0.7);
    margin-top: 6px;
    line-height: 1.45;
    font-weight: 500;
    padding: 8px 10px;
    background: var(--yellow-dim);
    border-radius: var(--radius-sm);
    border-left: 2.5px solid rgba(245,223,78,0.3);
  }

  .hidden{display:none !important;}

  /* ---------- Smooth scrollbar ---------- */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }
</style>
</head>

function money(n){ return '₹' + Number(n).toLocaleString('en-IN'); }

function getTotal(){
  let total = 0;
  if (selectedIds.has('premium_365')) total += 1000;
  courses.forEach(c => {
    if (selectedIds.has(c.id)){
      total += c.price;
    }
  });
  return total;
}

function renderCourseIcon(emoji){
  const val = String(emoji || "").trim();
  if(/^https?:\\/\\//i.test(val)){
    return \`<img src="\${val}" alt="" style="width:100%;height:100%;object-fit:cover;" />\`;
  }
  return val || "📘";
}

function toggleCourse(id, card){
  if (selectedIds.has(id)){
    selectedIds.delete(id);
    card.classList.remove('checked');
  } else {
    if (id === 'premium_365') {
      selectedIds.clear();
      document.querySelectorAll('.course-card').forEach(c => c.classList.remove('checked'));
    } else {
      if (selectedIds.has('premium_365')) {
        selectedIds.delete('premium_365');
        const pCard = document.querySelector('.course-card[data-id="premium_365"]');
        if (pCard) pCard.classList.remove('checked');
      }
    }
    selectedIds.add(id);
    card.classList.add('checked');
  }
  updateTotal();
}

    const upiLink = "upi://pay?pa=sandeepdarji.in-2@okhdfcbank&pn=Sphotoedit&am=" + total + "&cu=INR";

      step2Next.disabled = true;
      step2Next.textContent = 'Select a course';

  }
}

let paymentTimerInterval = null;
function startPaymentTimer() {
  const timerEl = document.getElementById('paymentTimer');
  if (!timerEl) return;
  clearInterval(paymentTimerInterval);
  let timeLeft = 180;
  timerEl.textContent = '03:00';
  timerEl.style.color = '#F5DF4E';
  paymentTimerInterval = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) {
      clearInterval(paymentTimerInterval);
      timerEl.textContent = '00:00';
      timerEl.style.color = 'var(--red, #f44336)';
    } else {
      const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
      const s = (timeLeft % 60).toString().padStart(2, '0');
      timerEl.textContent = m + ':' + s;
    }
  }, 1000);
}

// Wizard Step Navigation
function goToStep(step) {
  if (step === 3) startPaymentTimer();
  if (step > currentStep) {
    // Validate current step before moving forward
    if (currentStep === 1) {
      let valid = true;
      const name = nameInput.value.trim();
      const whatsapp = whatsappInput.value.trim();
      const email = emailInput.value.trim();

      if (!name){ nameError.classList.add('show'); valid = false; } else { nameError.classList.remove('show'); }
      if (!whatsapp || whatsapp.length < 6){ whatsappError.classList.add('show'); valid = false; } else { whatsappError.classList.remove('show'); }

      const emailOk = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+\$/.test(email);
      if (!emailOk){ emailError.classList.add('show'); valid = false; } else { emailError.classList.remove('show'); }
      
      if (!valid) return;
    }
    if (currentStep === 2) {
      if (getTotal() <= 0) return;
    }
  }

  // Update DOM active step panel
  document.querySelectorAll('.step-panel').forEach(panel => panel.classList.remove('active'));
  document.getElementById(\`step\${step}Panel\`).classList.add('active');

  // Update progress indicator dots and bar
  const dots = document.querySelectorAll('.step-dot');
  dots.forEach(dot => {
    const dotStep = parseInt(dot.dataset.step);
    dot.classList.remove('active', 'completed');
    if (dotStep === step) {
      dot.classList.add('active');
    } else if (dotStep < step) {
      dot.classList.add('completed');
    }
  });

  const progressBar = document.getElementById('progressBar');
  if (progressBar) {
    progressBar.style.width = ((step - 1) / 2 * 100) + '%';
  }

  currentStep = step;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  document.body.style.overflow = step === 3 ? 'hidden' : '';
}

let __jsonpCounter = 0;
function fetchSheetRows(sheetName){
  return new Promise((resolve, reject) => {
    const sheetId = atob(SHEET_ID_B64);
    const cbName = "__orderCB" + (__jsonpCounter++) + "_" + Date.now();
    let settled = false;

    const timeout = setTimeout(() => {
      if(settled) return;
      settled = true;
      cleanup();
      reject(new Error("Timeout loading sheet data"));
    }, 12000);

    function cleanup(){
      clearTimeout(timeout);
      try{ delete window[cbName]; }catch(e){}
      if(script && script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = function(json){
      if(settled) return;
      settled = true;
      cleanup();
      try{
        if(!json || json.status === "error" || !json.table){ reject(new Error("Sheet status error")); return; }
        const rows = (json.table.rows || []).map(r => (r.c || []).map(c => (c ? (c.v ?? "") : "")));
        resolve(rows);
      }catch(e){ reject(new Error("Data parsing error")); }
    };

    const url = \`https://docs.google.com/spreadsheets/d/\${sheetId}/gviz/tq?tqx=out:json;responseHandler:\${cbName}&sheet=\${encodeURIComponent(sheetName)}&_=\${Date.now()}\`;
    const script = document.createElement("script");
    script.src = url;
    script.onerror = function(){
      if(settled) return;
      settled = true;
      cleanup();
      reject(new Error("Network connection error"));
    };
    document.head.appendChild(script);
  });
}

async function loadCourses(){
  courseListEl.innerHTML = '<div class="loading-row">Loading courses…</div>';
  try {
    const rows = await fetchSheetRows(SHEET_TAB);
    courses = [];

    // Read already unlocked courses from localStorage so they don't show up in purchase list
    let unlockedIds = [];
    try {
      const stored = localStorage.getItem("sphotoedit_unlocked_ids");
      if (stored) {
        unlockedIds = JSON.parse(stored) || [];
      }
    } catch(e) {}

    function normalize(t) {
      return String(t || "").replace(/[^a-zA-Z0-9]/g, "").toLowerCase();
    }

    rows.forEach(r => {
      const idVal = r[COL_ID];
      if (!idVal) return;                                    // blank row
      if (String(idVal).trim().toLowerCase() === 'id') return; // stray header row
      if (String(idVal).trim().indexOf('/') === 0) return;    // "/Name" = hidden draft

      // Skip if course is already unlocked by the user
      if (unlockedIds.includes(normalize(idVal))) return;

      const titleVal = r[COL_TITLE];
      const descVal = r[COL_DESC];
      const emojiVal = r[COL_EMOJI];
      const priceVal = r[COL_PRICE];

      courses.push({
        id: idVal,
        title: titleVal || idVal,
        description: descVal || '',
        emoji: emojiVal || '',
        price: priceVal ? Number(priceVal) || 0 : 0
      });
    });

    if (!courses.length){
      courseListEl.innerHTML = '<div class="empty-row">No courses found in the "' + SHEET_TAB + '" tab.<br><button id="retryBtn" style="margin-top:10px;background:none;border:1px solid #2F38B2;color:#2F38B2;border-radius:4px;padding:6px 14px;font-family:Inter,sans-serif;font-size:12px;cursor:pointer;">Retry</button></div>';
      document.getElementById('retryBtn').addEventListener('click', loadCourses);
      return;
    }
    renderCourses();
  } catch (err){
    console.error('Course load failed:', err);
    courseListEl.innerHTML = '<div class="empty-row">Could not load courses — ' + (err.message || 'unknown error') +
      '.<br><button id="retryBtn" style="margin-top:10px;background:none;border:1px solid #2F38B2;color:#2F38B2;border-radius:4px;padding:6px 14px;font-family:Inter,sans-serif;font-size:12px;cursor:pointer;">Retry</button></div>';
    document.getElementById('retryBtn').addEventListener('click', loadCourses);
  }
}

/* ---------- CTA flow: submit ---------- */
ctaBtn.addEventListener('click', async () => {
  const total = getTotal();
  if (total <= 0) return;

  if (APPS_SCRIPT_URL.includes("REPLACE_WITH_YOUR_APPS_SCRIPT")) {
    alert("Developer Notice: Please replace the APPS_SCRIPT_URL placeholder with your real deployed Google Apps Script Web App URL to test submissions!");
    return;
  }

  ctaBtn.disabled = true;
  ctaBtn.textContent = 'Submitting…';

  const selectedCourses = courses.filter(c => selectedIds.has(c.id))
    .map(c => ({ id: c.id, title: (c.title || "").replace(/\\s+/g, ''), price: c.price }));

  if (selectedIds.has('premium_365')) {
    const today = new Date();
    const dd = String(today.getDate()).padStart(2, '0');
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const yyyy = today.getFullYear();
    const enrollDate = \`\${dd}/\${mm}/\${yyyy}\`;
    
    selectedCourses.unshift({
      id: enrollDate,
      title: enrollDate,
      price: 1000
    });
  }

  const email = emailInput.value.trim();

  try {
    // Fire and forget the fetch request so submission is instantaneous
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors', // Bypasses browser CORS checks on Google Apps Script redirection response
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight
      body: JSON.stringify({
        name: nameInput.value.trim(),
        whatsapp: whatsappInput.value.trim(),
        email: email,
        courses: selectedCourses,
        total: total
      })
    }).catch(e => console.error('Submission error:', e));

    // Auto-login: Save the email to localStorage so the course player auto-logs them in
    try {
      localStorage.setItem('sphotoedit_email', email);
    } catch(e) {}

    mainWrap.classList.add('hidden');
    successScreen.classList.add('open');
    window.parent.postMessage({ type: 'ENROLL_SUCCESS', email: email, courses: Array.from(selectedIds) }, '*');
  } catch (err){
    ctaBtn.disabled = false;
    ctaBtn.textContent = 'Complete enrollment';
    alert('Something went wrong submitting your enrollment. Please try again.');
  }
});

function copyUpiId() {
  const upiText = document.getElementById("upiId").textContent;
  navigator.clipboard.writeText(upiText).then(() => {
    const feedback = document.getElementById("copyFeedback");
    feedback.textContent = "Copied!";
    setTimeout(() => {
      feedback.textContent = "Copy UPI ID";
    }, 2000);
  }).catch(() => {
    alert("Could not copy automatically. Please copy: " + upiText);
  });
}

// Check query param (e.g. ?course=PhotoshopBasics&email=user@example.com) to pre-select course and email
function checkQueryParam() {
  const params = new URLSearchParams(window.location.search);
  const courseParam = params.get('course');
  if (courseParam) {
    const cleanParam = courseParam.trim().toLowerCase();
    const found = courses.find(c => c.id.toLowerCase() === cleanParam);
    if (found) {
      selectedIds.add(found.id);
      renderCourses();
      updateTotal();
    }
  }
  
  const emailParam = params.get('email');
  if (emailParam) {
    const emailInput = document.getElementById('emailInput');
    if (emailInput) {
      emailInput.value = emailParam;
    }
  }
}

// Show direct pay button on mobile devices
function detectMobile() {
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  if (isMobile) {
    const payBtn = document.getElementById('mobilePayBtn');
    if (payBtn) payBtn.style.display = 'inline-flex';
  }
}

// Initialize
(async () => {
  await loadCourses();
  checkQueryParam();
  detectMobile();
})();

function showVerificationStatusBar() {
  let bar = document.getElementById('verification-status-bar');
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'verification-status-bar';
    document.body.insertBefore(bar, document.body.firstChild);
  }
  
  let timeLeft = 120; // 2 minutes
  const messages = [
    "Payment under review",
    "Checking your details",
    "Verifying your purchase",
    "Preparing your access",
    "Access approval in progress",
    "Almost done",
    "Please wait a moment"
  ];
  let messageIndex = 0;
  
  const updateUI = () => {
    if (timeLeft > 0) {
      const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
      const s = (timeLeft % 60).toString().padStart(2, '0');
      const currentMsg = messages[messageIndex];
      
      bar.innerHTML = `
        <div class="vs-content">
          <div class="vs-spinner"></div>
          <span class="vs-msg">${currentMsg}</span>
          <span class="vs-timer">· ${m}:${s}</span>
        </div>
      `;
    } else {
      bar.innerHTML = `
        <div class="vs-content vs-ready">
          <span class="vs-msg" style="color:#fff; font-weight:600;">Ready to check your access?</span>
          <span class="vs-subtext">Refresh the page to check your access.</span>
          <button class="vs-btn" onclick="location.reload()">Refresh & Check</button>
        </div>
      `;
      clearInterval(timerInterval);
      clearInterval(msgInterval);
    }
  };
  
  updateUI();
  // Allow DOM to update before adding visible class for transition
  setTimeout(() => bar.classList.add('visible'), 50);
  
  const timerInterval = setInterval(() => {
    timeLeft--;
    updateUI();
  }, 1000);
  
  const msgInterval = setInterval(() => {
    if (timeLeft > 0) {
      messageIndex = (messageIndex + 1) % messages.length;
      updateUI();
    }
  }, 12000); // rotate every 12 seconds
}

async function verifyEmail(email){
  const rows = await fetchSheetRows(CONFIG.ACCESS_SHEET);
  const wanted = email.trim().toLowerCase();
  let dataRows = rows;
  if(rows.length && !String(rows[0][0] || "").includes("@")){
    dataRows = rows.slice(1); // skip header row
  }
  for(const row of dataRows){
    const rowEmail = String(row[0] || "").trim().toLowerCase();
    if(rowEmail === wanted){
      const tagsRaw = String(row[1] || "");
      let tags = tagsRaw.split(/[\s,]+/).map(normalizeTag).filter(Boolean);
      const personalNotif = String(row[3] || "").trim(); // Column D is index 3
      const purchaseDateRaw = String(row[2] || "").trim(); // Column C is index 2
      
      let subscriptionInfo = null;
      let subscriptionActive = false;
      
      if (purchaseDateRaw && purchaseDateRaw.length > 2) {
        subscriptionActive = true; // Assume active initially if they have data in Column C
        let d = NaN, m = NaN, y = NaN;
        
        // Match Date(y,m,d) from GViz
        const gvizMatch = purchaseDateRaw.match(/Date\((\d+),\s*(\d+),\s*(\d+)/);
        if (gvizMatch) {
          y = parseInt(gvizMatch[1], 10);
          m = parseInt(gvizMatch[2], 10);
          d = parseInt(gvizMatch[3], 10);
        } else {
          // Extract any DD/MM/YYYY or DD-MM-YYYY
          const textMatch = purchaseDateRaw.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
          if (textMatch) {
            d = parseInt(textMatch[1], 10);
            m = parseInt(textMatch[2], 10) - 1;
            y = parseInt(textMatch[3], 10);
          } else {
            // Fallback generic parse
            const dt = new Date(purchaseDateRaw);
            if (!isNaN(dt.getTime())) {
              d = dt.getDate();
              m = dt.getMonth();
              y = dt.getFullYear();
            }
          }
        }
        
        if (!isNaN(d) && !isNaN(m) && !isNaN(y)) {
          const purchaseDate = new Date(y, m, d);
          
          if (!isNaN(purchaseDate.getTime())) {
            const msPerDay = 1000 * 60 * 60 * 24;
            const expiryDate = new Date(purchaseDate.getTime() + 365 * msPerDay);
            const today = new Date();
            const daysLeft = Math.ceil((expiryDate - today) / msPerDay);
            
            subscriptionActive = daysLeft >= 0;
            
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const formattedDate = `${String(d).padStart(2, '0')} ${monthNames[m]} ${y}`;
            
            subscriptionInfo = {
              dateString: formattedDate,
              daysLeft: daysLeft < 0 ? 0 : daysLeft,
              active: subscriptionActive
            };
          }
        } else {
          // Could not parse the date correctly, but they have text in Column C.
          subscriptionInfo = {
            dateString: purchaseDateRaw,
            daysLeft: 365, // placeholder
            active: true
          };
        }
        
        if (!subscriptionActive) {
          tags = []; // Revoke access if expired
        }
      }
      
      return { tags, personalNotif, subscriptionInfo, subscriptionActive };
    }
  }
  return null; // not found
}

async function fetchCourseList(){
  // Optional "Courses" tab: id | title | description | emoji | price
  // Lets you add new courses to the dashboard without ever editing this file.
  try{
    const rows = await fetchSheetRows("Courses");
    if(!rows.length) return null;
    let dataRows = rows;
    if(String(rows[0][0] || "").trim().toLowerCase() === "id"){
      dataRows = rows.slice(1);
    }
    const list = dataRows
      .filter(r => String(r[0] || "").trim() !== "")
      .map(r => ({
        id: String(r[0] || "").trim(),
        title: String(r[1] || "").trim() || String(r[0] || "").trim(),
        description: String(r[2] || "").trim(),
        emoji: String(r[3] || "").trim() || "📘",
        price: r[4] ? Number(r[4]) || 0 : 0
      }));
    return list.length ? list : null;
  }catch(e){
    return null; // sheet missing / empty → caller falls back to CONFIG.COURSES
  }
}

async function fetchAssetsList(){
  try{
    const rows = await fetchSheetRows("@");
    if(!rows.length) return null;
    let dataRows = rows;
    if(String(rows[0][0] || "").trim().toLowerCase() === "id" || String(rows[0][0] || "").trim().toLowerCase() === "assets" || String(rows[0][1] || "").trim().toLowerCase() === "title"){
      dataRows = rows.slice(1);
    }
    const list = dataRows
      .filter(r => {
        const c0 = String(r[0] || "").trim().toLowerCase();
        const c1 = String(r[1] || "").trim().toLowerCase();
        if (c0 === "") return false;
        // Ignore secondary headers that might have been pasted
        if (c0 === "assets" || c0 === "id" || c1 === "title") return false;
        return true;
      })
      .map(r => ({
        id: String(r[0] || "").trim(),
        title: String(r[1] || "").trim() || String(r[0] || "").trim(),
        videoUrl: String(r[2] || "").trim(),
        type: String(r[3] || "").trim(),
        description: String(r[4] || "").trim(),
        downloadLink: String(r[5] || "").trim(),
        emoji: String(r[6] || "").trim() || "📦"
      }));
    return list.length ? list : null;
  }catch(e){
    return null; 
  }
}

/* Strip free (#) / coming-soon (//) markers to get the real sheet tab name.
   The Courses sheet id column uses these prefixes as flags, but the actual
   sheet tab holding the lectures is always named WITHOUT them. */
function sheetTabName(courseId) {
  return String(courseId || '').replace(/^#+/, '').replace(/^\/\//, '').trim();
}

async function loadCourse(courseId){
  const rows = await fetchSheetRows(sheetTabName(courseId));
  if(!rows.length) return { title:null, lectures:[] };

  let title = null;
  let dataRows = rows;
  const firstRow = rows[0];
  const firstColB = String(firstRow[1] || "").trim();
  if(firstColB === "" && String(firstRow[0] || "").trim() !== ""){
    title = String(firstRow[0]).trim();
    dataRows = rows.slice(1);
  }

  const lectures = dataRows
    .filter(r => {
      const a = String(r[0] || "").trim().toLowerCase();
      return a !== "lecture title" && a !== "title" && a !== "lecture";
    })
    .filter(r => String(r[0] || "").trim() !== "" || String(r[1] || "").trim() !== "")
    .map(r => {
      const lecTitle = String(r[0] || "").trim();
      const url = String(r[1] || "").trim();
      const typeRaw = String(r[2] || "").trim().toLowerCase();
      const type = typeRaw.includes("assign") ? "assignment" : "lecture";
      const parsed = parseVideoUrl(url);
      const description = String(r[3] || "").trim();
      const assetsUrl = String(r[4] || "").trim();
      return { 
        title: lecTitle, 
        url, 
        type, 
        embed: parsed.embed, 
        original: parsed.original,
        description,
        assetsUrl
      };
    })
    .filter(l => l.url);

  return { title, lectures };
}

async function handleLoginSubmit(rawEmail){
  const email = (rawEmail || "").trim();
  if(!email || !email.includes("@")){
    const err = document.getElementById("loginError");
    err.textContent = "Enter a valid email address.";
    err.classList.add("show");
    return;
  }
  state.email = email;
  if(HAS_STORAGE) {
    try {
      localStorage.setItem(STORAGE_KEY, email);
    } catch(e) {}
  }
  renderVerifying();
  try{
    const accessData = await verifyEmail(email);
    if(accessData === null){
      state.screen = "locked";
      renderLocked();
      return;
    }
    state.unlockedIds = accessData.tags;
    state.subscriptionActive = accessData.subscriptionActive;
    if(HAS_STORAGE) {
      try {
        localStorage.setItem("sphotoedit_unlocked_ids", JSON.stringify(accessData.tags));
      } catch(e) {}
    }
    const dynamicList = await fetchCourseList();
    state.courseList = dynamicList || CONFIG.COURSES;
    
    try {
      state.notifications = await fetchNotifications();
    } catch(e) {
      state.notifications = [{
        id: "default_security_warning",
        message: "⚠️ Sharing your login email may permanently disable your course access.",
        link: ""
      }];
    }

    if (accessData.subscriptionInfo) {
      const info = accessData.subscriptionInfo;
      const subMsg = `Purchased on ${info.dateString} · ${info.daysLeft} days left`;
      state.notifications.unshift({
        id: "sub_notif_" + Date.now(),
        message: subMsg,
        link: ""
      });
    }

    if (accessData.personalNotif) {
      state.notifications.unshift({
        id: "personal_notif_" + btoa(unescape(encodeURIComponent(accessData.personalNotif))).substring(0, 10),
        message: accessData.personalNotif,
        link: ""
      });
    }

    calculateUnreadNotifications();

    if(HAS_STORAGE) localStorage.setItem(STORAGE_KEY, email);
    state.screen = "dashboard";
    renderDashboard();
  }catch(e){
    renderError(e.message);
  }
}

    return `<img src="${escapeHtml(val)}" alt="" style="width:100%;height:100%;object-fit:cover;" />`;
  }
  return escapeHtml(val || "📘");

function renderDashboard(){
  state.screen = "dashboard";
  const app = document.getElementById("app");
  let list = (state.courseList && state.courseList.length) ? state.courseList : CONFIG.COURSES;

  // Filter out courses that are under construction (id or title starts with "/") but keep "//" (coming soon)
  list = list.filter(c => {
    const id = String(c.id || "").trim();
    const title = String(c.title || "").trim();
    return !( (id.startsWith("/") && !id.startsWith("//")) || (title.startsWith("/") && !title.startsWith("//")) );
  });

  let cards = "";
  if (state.activeTab === "courses") {
    let list = (state.courseList && state.courseList.length) ? state.courseList : CONFIG.COURSES;
    list = list.filter(c => {
      const id = String(c.id || "").trim();
      const title = String(c.title || "").trim();
      return !( (id.startsWith("/") && !id.startsWith("//")) || (title.startsWith("/") && !title.startsWith("//")) );
    });

    list.sort((a, b) => {
      const aIsFree = String(a.id || "").trim().startsWith("#") || String(a.title || "").trim().startsWith("#");
      const bIsFree = String(b.id || "").trim().startsWith("#") || String(b.title || "").trim().startsWith("#");
      const aUnlocked = aIsFree || state.subscriptionActive || state.unlockedIds.includes(normalizeTag(a.id));
      const bUnlocked = bIsFree || state.subscriptionActive || state.unlockedIds.includes(normalizeTag(b.id));
      if (aUnlocked && !bUnlocked) return -1;
      if (!aUnlocked && bUnlocked) return 1;
      return 0;
    });

    cards = list.map(c => {
      const isFree = String(c.id || "").trim().startsWith("#") || String(c.title || "").trim().startsWith("#");

      const isComingSoon = String(c.id || "").trim().startsWith("//") || String(c.title || "").trim().startsWith("//");
      
      let displayTitle = escapeHtml(c.title);
      if (isComingSoon) {
        displayTitle = displayTitle.replace(/^\/\//, '');

      return `

                      ? `<span class="pill pill-locked" style="background:rgba(255,255,255,0.1);color:#fff;">⏳ Coming Soon</span>` 
                      : `<span class="pill pill-locked"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-top:-2px;margin-right:4px"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg> LOCKED</span>`
                    )

                  : (isUnlocked
                      ? `<span class="link-btn" style="text-decoration:none;color:var(--yellow);font-size:12px;padding:0; font-weight:600;">Open Asset →</span>`
                      : `<span class="pill pill-locked"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-top:-2px;margin-right:4px"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg> LOCKED</span>`
                    )

              </div>
              <button class="course-preview-btn ${isUnlocked ? 'is-unlocked' : ''}" onclick="event.stopPropagation(); openCoursePreview('${escapeHtml(a.id)}')" aria-label="Preview asset">

async function openCourse(courseId){
  if (typeof gtag === 'function') {
    gtag('event', 'page_view', {
      page_title: 'Course/Asset: ' + courseId,
      page_location: window.location.href + '?view=' + encodeURIComponent(courseId)
    });
  }

  renderVerifying("Loading content…");

  // Check if it's an asset first
  if (state.assetsList) {
    const asset = state.assetsList.find(a => a.id === courseId);
    if (asset) {
      state.current.courseId = courseId;
      state.current.courseTitle = asset.title;
      state.current.lectures = [{
        title: asset.title,
        type: "asset",
        url: asset.videoUrl,
        embed: parseVideoUrl(asset.videoUrl)?.embed || "",
        assetsUrl: asset.downloadLink,
        description: asset.description,
        assetType: asset.type
      }];
      state.current.index = 0;
      state.screen = "player";
      renderPlayer();
      return;
    }
  }

  try{
    const { title, lectures } = await loadCourse(courseId);
    const list = (state.courseList && state.courseList.length) ? state.courseList : CONFIG.COURSES;
    const cfg = list.find(c => c.id === courseId);
    state.current.courseId = courseId;
    state.current.courseTitle = title || (cfg ? cfg.title : courseId);
    state.current.lectures = lectures;
    state.current.index = 0;
    state.screen = "player";
    renderPlayer();
  }catch(e){
    renderError(e.message);
  }
}

function selectLecture(i){
  state.current.index = i;
  renderPlayer();
  closeDrawer();
  window.scrollTo({ top:0, behavior:"smooth" });
}
function goPrev(){
  if(state.current.index > 0){ state.current.index--; renderPlayer(); window.scrollTo({top:0,behavior:"smooth"}); }
}
function goNext(){
  if(state.current.index < state.current.lectures.length-1){ state.current.index++; renderPlayer(); window.scrollTo({top:0,behavior:"smooth"}); }
}
function openDrawer(){
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("drawerOverlay").classList.add("show");
}
function closeDrawer(){
  const sb = document.getElementById("sidebar");
  const ov = document.getElementById("drawerOverlay");
  if(sb) sb.classList.remove("open");
  if(ov) ov.classList.remove("show");
}

function dismissLogin() {
  state.screen = "dashboard";
  renderDashboard();
}

function searchCourses(query) {
  const lowerQuery = query.toLowerCase().trim();
  const cards = document.querySelectorAll(".course-grid .course-card");
  cards.forEach(card => {
    const titleEl = card.querySelector(".course-text-wrap h3");
    if (titleEl) {
      const title = titleEl.textContent.toLowerCase();
      if (title.includes(lowerQuery)) {
        card.style.display = "";
      } else {
        card.style.display = "none";
      }
    }
  });
}

function showLoginOverlay() {
  state.screen = "login";
  renderLogin();
}

  if(cachedUnlocked) {
    try {
      state.unlockedIds = JSON.parse(cachedUnlocked);
    } catch(e) {}
  }
  
  // Background load course list to show accurate preview in background if available
  fetchCourseList().then(list => {
    if (list) {
      state.courseList = list;
      if (state.screen === "login") {
        renderLogin(); // Refresh preview cards with real sheet data!
      }
    }
  }).catch(() => {});

  fetchAssetsList().then(list => {
    if (list) {
      state.assetsList = list;
      if (state.screen === "dashboard" && state.activeTab === "assets") {
        renderDashboard();
      }
    }
  }).catch(() => {});

  if(savedEmail){
    state.email = savedEmail;
    handleLoginSubmit(savedEmail);
  }else{
    renderLogin();
  }
})();
</script>
</body>
</html>
